name: PR Domain Validator

on:
  pull_request:
    paths:
      - BlockList.txt

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate changed domains
        id: validate
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref }}"

          CHANGED=$(git diff --unified=0 origin/${{ github.base_ref }}...HEAD -- BlockList.txt \
            | grep '^+' \
            | grep -v '^\+\+\+' \
            | sed 's/^+//')

          echo "Changed entries:"
          echo "$CHANGED"

          errors=""

          while IFS= read -r line; do

            [ -z "$line" ] && continue

            clean=$(echo "$line" | xargs)

            if [[ "$clean" =~ ^https?:// ]]; then
              errors+="• URL instead of domain: $clean"$'\n'
              continue
            fi

            if [[ "$clean" == */* ]]; then
              errors+="• Path detected: $clean"$'\n'
              continue
            fi

            if [[ "$clean" == *"?"* ]]; then
              errors+="• Query string detected: $clean"$'\n'
              continue
            fi

            if [[ ! "$clean" =~ ^[a-z0-9.-]+\.[a-z]{2,}$ ]]; then
              errors+="• Invalid domain format: $clean"$'\n'
            fi

          done <<< "$CHANGED"

          {
            echo "errors<<EOF"
            echo "$errors"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ -n "$errors" ]; then
            exit 1
          fi

      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const errors = `${{ steps.validate.outputs.errors }}`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ❌ Domain Validation Failed

The following problems were found:

${errors}

### Accepted format

\`\`\`
example.com
sub.example.com
\`\`\`

### Not accepted

\`\`\`
https://example.com
example.com/path
example.com?query=1
\`\`\`

Please update your PR and push again.`
            });
