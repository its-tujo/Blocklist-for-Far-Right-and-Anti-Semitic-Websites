name: PR Domain Validator

on:
  pull_request:
    paths:
      - "BlockList.txt"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed lines
        id: diff
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref }}"

          CHANGED=$(git diff --unified=0 origin/${{ github.base_ref }}...HEAD -- BlockList.txt \
            | grep '^+' \
            | grep -v '^\+\+\+' \
            | sed 's/^+//' \
            || true)

          echo "Changed lines:"
          echo "$CHANGED"

          ERRORS=""

          while IFS= read -r line; do
            clean=$(echo "$line" | xargs)

            [ -z "$clean" ] && continue

            # URL check
            if [[ "$clean" =~ ^https?:// ]]; then
              ERRORS="$ERRORS• URL not allowed: $clean"$'\n'
              continue
            fi

            # path check
            if [[ "$clean" == */* ]]; then
              ERRORS="$ERRORS• Path detected: $clean"$'\n'
              continue
            fi

            # query check
            if [[ "$clean" == *"?"* ]]; then
              ERRORS="$ERRORS• Query string detected: $clean"$'\n'
              continue
            fi

            # format check
            if ! [[ "$clean" =~ ^[a-z0-9.-]+\.[a-z]{2,}$ ]]; then
              ERRORS="$ERRORS• Invalid domain format: $clean"$'\n'
            fi

          done <<< "$CHANGED"

          echo "errors<<EOF" >> $GITHUB_OUTPUT
          echo "$ERRORS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ -n "$ERRORS" ]; then
            echo "FAILED=1" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "FAILED=0" >> $GITHUB_OUTPUT

      - name: Comment on PR (on failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const errors = `${{ steps.diff.outputs.errors }}`;

            const body = [
              "## ❌ Domain Validation Failed",
              "",
              "The following issues were detected:",
              "",
              errors || "Unknown error",
              "",
              "## Allowed format",
              "```",
              "example.com",
              "sub.example.com",
              "```",
              "",
              "## Not allowed",
              "```",
              "https://example.com",
              "example.com/path",
              "example.com?query=1",
              "```",
              "",
              "Please fix the PR and push again."
            ].join("\n");

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
