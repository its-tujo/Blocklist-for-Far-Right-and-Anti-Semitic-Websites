name: Sync Blocklists

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Run sync
        run: python sync.py

      # =========================
      # STEP SUMMARY (UI TABLE)
      # =========================
      - name: GitHub Step Summary
        run: |
          echo "## Blocklist Sync Summary" >> $GITHUB_STEP_SUMMARY
          cat step_summary.md >> $GITHUB_STEP_SUMMARY

      # =========================
      # SHOW GIT DIFF
      # =========================
      - name: Show diff
        run: |
          echo "## Git Diff"
          git diff || true

      # =========================
      # COMMIT CHANGES
      # =========================
      - name: Commit changes
        run: |
          git config user.name "blocklist-bot"
          git config user.email "blocklist-bot@users.noreply.github.com"

          git add BlockList.txt uBlock.txt LeechBlock.txt report.md

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "sync blocklists"
          git push

      # =========================
      # ARTIFACT (DOWNLOADABLE REPORT)
      # =========================
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: blocklist-sync-report
          path: report.md